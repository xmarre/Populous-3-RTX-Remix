; Populous: The Beginning RTX Remix experiment
; Use after applying the Windows 10/11 hardware-mode fix.
;
; Required dxwrapper files in the game root:
;   ddraw.dll       <- dxwrapper Stub\ddraw.dll
;   dxwrapper.dll
;   dxwrapper.ini   <- this file
;
; Required Remix files in the game root:
;   d3d9.dll        <- this repo's selector
;   d3d9-remix.dll  <- NVIDIA Runtime root d3d9.dll renamed
;   .trex\          <- NVIDIA Runtime folder

[General]
RealDllPath=auto
WrapperMode=1
LoadCustomDllPath=
ExcludeProcess=
IncludeProcess=D3DPopTB.exe,popTB.exe
RunProcess=
WaitForProcess=0
DisableLogging=0

[Compatibility]
Dd7to9=1
DdrawCompat=0
DisableGameUX=1
SingleProcAffinity=0

[ddraw]
DdrawHookSystem32=0
DdrawOverrideBitMode=0
DdrawUseNativeResolution=0

[Dd7to9]
AutoFrameSkip=0
DdrawEmulateSurface=1
DdrawLimitDisplayModeCount=0
DdrawUseDirect3DDevice=1

[d3d9]
D3d9to9Ex=0
EnableD3d9Wrapper=1
FullscreenWindowMode=1
ForceExclusiveFullscreen=0
ForceMixedVertexProcessing=1
ForceSystemMemVertexCache=0
LimitPerFrameFPS=0
