# Populous 3 / Populous: The Beginning RTX Remix starter config.
# Runtime assets are expected under rtx-remix/ next to this file.

rtx.captureDirectory = "rtx-remix/captures"

# Keep orthographic draws visible if the optional RHW fixup is enabled later.
rtx.orthographicIsUI = False
rtx.useVertexCapture = True
rtx.enableAlwaysCalculateAABB = True
