# Populous 3 RTX Remix runtime configuration
#
# The Multiverse Direct3D9 renderer reaches Remix, but its problematic path
# emits pre-transformed/RHW vertices. The selector shim now rewrites those draw
# calls into a synthetic fixed-function orthographic camera path before Remix
# sees them. Orthographic draw calls must therefore be eligible for scene
# processing instead of being treated as UI by default.

rtx.captureDirectory = "rtx-remix/captures"
rtx.orthographicIsUI = False
rtx.useVertexCapture = True
rtx.enableAlwaysCalculateAABB = True
