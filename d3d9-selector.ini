[popTBM]
; Multiverse/cnc-ddraw D3D9 exposes the visible frame as a final XYZRHW|TEX1 quad.
; Keep this attach point crash-free for diagnostics, but this path cannot expose
; world geometry/camera data to RTX Remix.
deferCreates=3
forceWindowedForRemix=1
enableRhwFixup=0
forceAutoDepthStencilForRemix=0
promoteSystemDeviceWithAutoDepth=1
traceD3D9Stream=1
traceRenderStates=0
traceDrawLimit=2048
