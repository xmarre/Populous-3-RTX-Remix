[popTBM]
; Root crash containment: Populous/Multiverse creates transient D3D9 devices for
; video/menu and destroys them when entering gameplay. RTX Remix's bridge is not
; surviving that teardown. Keep Remix off the first three D3D9 interface creates
; so the menu device stays on system D3D9 and the gameplay device is the first
; Remix-owned device. Increase to 4 if the selector log still shows Remix in menu.
deferCreates=3

; Keep enabled until the bridge survives the gameplay create reliably. This forces
; only Remix-routed devices to use windowed presentation parameters; system-routed
; video/menu devices are not changed. Set to 0 later if fullscreen is stable.
forceWindowedForRemix=1

; Experimental RHW/POSITIONT conversion. Disabled until the device lifetime crash
; is gone.
enableRhwFixup=0

; If a deferred/system-routed D3D9 object later creates the first real 3D
; gameplay device with auto-depth enabled, promote that one CreateDevice call
; to RTX Remix instead of waiting for another Direct3DCreate9 call.
promoteSystemDeviceWithAutoDepth=1
