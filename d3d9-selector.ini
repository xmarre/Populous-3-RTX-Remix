[popTBM]
; First three Direct3D interface creates are startup/video/menu devices. Keep Remix
; off them; route later stable gameplay devices to Remix.
deferCreates=3

; Keep Remix-owned devices out of exclusive fullscreen. This fixed the menu crash.
forceWindowedForRemix=1

; Required now: repair D3D9 transformed-position streams before they reach Remix.
; Handles FVF XYZRHW and vertex declarations using POSITIONT.
enableRhwFixup=1

; Force an auto depth/stencil attachment on Remix-routed devices. The game asks
; for depth=0 on all current devices; Remix needs usable geometry/depth metadata.
; If device creation fails, the shim retries once without forced depth.
forceAutoDepthStencilForRemix=1

; Historical promotion path. Current log shows all first three devices have
; depth=0, so this does not promote anything in the current run.
promoteSystemDeviceWithAutoDepth=1
