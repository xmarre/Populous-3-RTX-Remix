[popTBM]
; Trace showed Direct3DCreate9 call 4 is still the menu/presentation path:
; FVF 0x104 = D3DFVF_XYZRHW | TEX1, triangle-strip quads, depth off.
; Keep Remix out of that final-blit device. Start Remix at call 5 instead.
deferCreates=4

; Keep Remix-owned devices out of exclusive fullscreen. This avoids the bridge
; crash on transient Multiverse menu/startup devices.
forceWindowedForRemix=1

; Do not mutate Populous' RHW stream. The previous rewrite caused a black image.
enableRhwFixup=0
forceAutoDepthStencilForRemix=0
promoteSystemDeviceWithAutoDepth=1

; Passive focused trace. Render state spam is disabled by default; draw records
; classify RHW fullscreen blits as FINAL_BLIT_RHW.
traceD3D9Stream=1
traceRenderStates=0
traceDrawLimit=2048
