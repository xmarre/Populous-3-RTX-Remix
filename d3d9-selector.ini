[popTBM]
; First three Direct3D interface creates are startup/video/menu devices. Keep Remix
; off them; route later stable gameplay devices to Remix.
deferCreates=3

; Keep Remix-owned devices out of exclusive fullscreen. This fixed the menu crash.
forceWindowedForRemix=1

; Disabled by default. The naive RHW->POSITION rewrite caused a black menu because
; it mutated Populous' already-transformed presentation path.
enableRhwFixup=0

; Disabled by default. Populous currently creates all observed devices with no
; auto-depth buffer; forcing one can change depth-test behavior before the real
; world draw path is identified.
forceAutoDepthStencilForRemix=0

; Historical promotion path. Current logs show the first three devices have
; depth=0, so this does not promote anything in the current run.
promoteSystemDeviceWithAutoDepth=1

; Passive instrumentation only. This wraps stable Remix devices but does not
; rewrite FVF/declarations/render state. It logs what Multiverse's D3D9 renderer
; actually submits.
traceD3D9Stream=1
traceDrawLimit=512
