[popTBM]
; Multiverse creates short-lived D3D9 objects before the real menu/game device.
; The first two creates stay on system D3D9 so Remix does not attach to intro/movie devices.
deferCreates=2

; Root crash fix: the bridge log shows the menu transition creating exclusive
; fullscreen Remix/DXVK swapchains and then destroying the device/module. The
; NVIDIA bridge config's client.forceWindowed option is not parsing in this run,
; so the selector enforces windowed presentation parameters before CreateDevice
; reaches d3d9-remix.dll.
forceWindowedForRemix=1

; Experimental. Disabled by default because the current crash occurs during
; device/swapchain ownership, before RHW draw repair is relevant.
enableRhwFixup=0
